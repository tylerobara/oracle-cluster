traefik:
  image:
    registry: ghcr.io
    repository: 11notes/traefik
    tag: 3.7.4@sha256:30e6bf1d65a1fff565e5fb399836842356a6f66b844d52ebc2fcdda1cdf4d246

  ingressRoute:
    dashboard:
      enabled: true
      matchRule: Host(`traefik.cloud.obara.xyz`)
      entryPoints:
        - websecure
      middlewares:
        - name: traefik-oidc-auth

  global:
    sendAnonymousUsage: false
    checkNewVersion: false

  additionalArguments:
    - "--providers.kubernetesingress.ingressendpoint.publishedservice=traefik/traefik"
    - "--serversTransport.insecureSkipVerify=true"
    - "--log.level=INFO"
    - "--providers.kubernetescrd.allowexternalnameservices=true"
    - "--providers.kubernetescrd.allowCrossNamespace=true"
  providers:
    kubernetesCRD:
      enabled: true
      allowExternalNameServices: true
    kubernetesIngress:
      enabled: true
      allowExternalNameServices: true
      publishedService:
        enabled: false

  ports:
    web:
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
    forgejo-ssh:
      port: 2222
      expose:
        default: true
    websecure:
      http:
        transport:
          respondingTimeouts:
            readTimeout: 180s

  tlsStore:
    default:
      defaultCertificate:
        secretName: cloud-obara-xyz-tls

  logs:
    general:
      level: "DEBUG"
    access:
      enabled: true
      format: "json"

  gateway:
    enabled: false

  experimental:
    plugins:
      traefik-oidc-auth:
        moduleName: "github.com/sevensolutions/traefik-oidc-auth"
        version: "v0.20.1"

  service:
    loadBalancerIP: "10.0.0.68"
